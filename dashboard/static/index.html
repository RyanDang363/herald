<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ER Twin — Live Floor</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>AgentER — Live Floor</h1>
    <div class="meta">
      <span id="banner" class="banner hidden">data source unavailable — showing last known state</span>
      <span id="live-dot" class="live-dot" title="live"></span>
      <span id="updated" class="updated">—</span>
      <a class="logout" href="/logout">Sign out</a>
    </div>
  </header>

  <!-- KPI strip -->
  <section id="kpis" class="kpis"></section>

  <main>
    <section class="panel">
      <h2>Beds</h2>
      <div id="beds" class="bed-grid"></div>
    </section>

    <section class="panel">
      <h2>Patients</h2>
      <div id="patients" class="cards"></div>
    </section>

    <section class="panel">
      <h2>Staff</h2>
      <div id="staff" class="cards"></div>
    </section>

    <section class="panel">
      <h2>Equipment</h2>
      <div id="equipment" class="cards"></div>
    </section>

    <section class="panel wide">
      <h2>Event Log</h2>
      <ul id="events" class="events"></ul>
    </section>
  </main>

  <!-- Command bar slot (hidden in read-only baseline; revealed when input is enabled) -->
  <footer id="command-bar" class="hidden">
    <input id="command-input" type="text" placeholder="Type a command for the orchestrator…" />
    <button id="command-send">Send</button>
  </footer>

  <div id="toasts" class="toasts"></div>

  <script src="/static/app.js"></script>
</body>
</html>
